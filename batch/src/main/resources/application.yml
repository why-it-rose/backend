spring:
  application:
    name: why-it-rose-batch
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  batch:
    job:
      enabled: false
  main:
    web-application-type: none

stock:
  master:
    load-at-startup: false
  price:
    load-at-startup: false

ls:
  openapi:
    base-url: ${LS_OPENAPI_BASE_URL:https://openapi.ls-sec.co.kr:8080}
    access-token: ${LS_ACCESS_TOKEN:}
    seed-resource: classpath:seed/index-universe.json
    min-interval-ms: 500
    # t8451 전역 스로틀 (초당 1건 ≒ 1000ms)
    chart-min-interval-ms: ${LS_CHART_MIN_INTERVAL_MS:1000}
    full-master-when-seed-empty: true
