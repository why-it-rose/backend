name: CI

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop, main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Run tests
        run: ./gradlew :api-server:test --no-daemon

      - name: Upload test report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: api-server/build/reports/tests/

  build-and-push:
    needs: test
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    outputs:
      sha: ${{ steps.meta.outputs.sha }}
      env: ${{ steps.meta.outputs.env }}
    steps:
      - uses: actions/checkout@v4

      - name: Determine env and image tag
        id: meta
        run: |
          SHA=$(echo $GITHUB_SHA | cut -c1-7)
          echo "sha=$SHA" >> $GITHUB_OUTPUT
          if [ "$GITHUB_REF_NAME" == "main" ]; then
            echo "env=prod" >> $GITHUB_OUTPUT
          else
            echo "env=dev" >> $GITHUB_OUTPUT
          fi

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/wir-backend:${{ steps.meta.outputs.env }}
            ${{ secrets.DOCKERHUB_USERNAME }}/wir-backend:${{ steps.meta.outputs.sha }}

  trigger-jenkins:
    needs: build-and-push
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Jenkins deployment
        run: |
          curl -s --fail -X POST \
            "${{ secrets.JENKINS_URL }}/job/wir-backend-${{ needs.build-and-push.outputs.env }}/buildWithParameters" \
            --user "${{ secrets.JENKINS_USER }}:${{ secrets.JENKINS_TOKEN }}" \
            --data "IMAGE_TAG=${{ needs.build-and-push.outputs.sha }}"
